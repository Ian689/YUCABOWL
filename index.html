<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Sencilla</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icono de FontAwesome para el logo de WhatsApp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Imagen de Inicio -->
    <section class="hero">
        <img src="Imagenes/5.jpeg" alt="Inicio">
    </section>

    <!-- Imagen de Menú -->
    <section class="menu-image">
        <img src="Imagenes/MENU.jpeg" alt="Menú">
    </section>

    <!-- Carrusel de 4 Imágenes -->
    <div class="carousel-container">
        <div class="carousel-slide">
            <img src="Imagenes/1.jpeg" class="active">
            <img src="Imagenes/2.jpeg">
            <img src="Imagenes/3.jpeg">
            <img src="Imagenes/4.jpeg">
        </div>
        <button id="prevBtn">❮</button>
        <button id="nextBtn">❯</button>
    </div>

    <!-- Botón de WhatsApp Flotante -->
    <a href="https://wa.me/5647767117" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
